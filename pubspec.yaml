name: appmarket_mobile
description: Global Project Marketplace Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  http: ^1.2.0

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.10

  # Navigation
  go_router: ^13.0.0

  # Storage
  shared_preferences: ^2.2.2
  # flutter_secure_storage: ^9.0.0 (disabled for web - requires symlink support)

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # Fonts
  google_fonts: ^6.2.1

  # Images & Files (disabled for web)
  # image_picker: ^1.0.7
  # file_picker: ^6.1.1

  # Real-time Chat
  web_socket_channel: ^2.4.0

  # Authentication (disabled for web)
  # google_sign_in: ^6.2.1

  # Payment (disabled for web)
  # flutter_stripe: ^9.2.0
  # stripe_android: ^9.2.0
  # stripe_ios: ^9.2.0
  # stripe_platform_interface: ^9.2.0

  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1

  # Animations
  flutter_animate: ^4.2.0+1
  lottie: ^2.7.0
  rive: ^0.11.17
  simple_animations: ^5.0.2
  supercharged: ^2.1.1
  animated_text_kit: ^4.2.2
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.5
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1

  # Internationalization
  easy_localization: ^3.0.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/
  # fonts are loaded via google_fonts package
