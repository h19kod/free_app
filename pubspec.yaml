name: appmarket_mobile
description: Global Project Marketplace Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  http: ^1.2.0

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.10

  # Navigation
  go_router: ^13.0.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI Components
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # Fonts
  google_fonts: ^6.2.1

  # Images & Files
  image_picker: ^1.0.7
  file_picker: ^6.1.1

  # Real-time Chat
  web_socket_channel: ^2.4.0

  # Authentication
  google_sign_in: ^6.2.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  # fonts are loaded via google_fonts package
